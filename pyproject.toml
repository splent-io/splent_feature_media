[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_media"
version = "0.4.0"
readme = "README.md"
requires-python = ">=3.13"

dependencies = [
    "Pillow>=10",
]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.tests", "*.tests.*"]

[tool.splent]
cli_version = "1.11.0"

# ── Feature Contract (auto-generated) ────────────────────────────────────────
# Do not edit manually — re-run `splent feature:contract --write` to refresh.
[tool.splent.contract]
description = "Media library — upload and manage files (the WordPress Media Library analogue)"

[tool.splent.contract.provides]
routes     = ["/admin/media", "/admin/media/<int:item_id>", "/admin/media/<int:item_id>/crop", "/admin/media/<int:item_id>/delete", "/admin/media/upload", "/media"]
blueprints = []
models     = ["MediaItem"]
commands   = ["hello"]
hooks      = ["layout.authenticated_sidebar"]
services   = ["MediaService"]
signals    = []
translations = []
docker     = []

[tool.splent.contract.requires]
features = []
env_vars = []
signals  = []

[tool.splent.contract.extensible]
services  = ["MediaService"]
templates = ["media/admin.html", "media/admin_detail.html", "media/gallery.html", "media/index.html"]
models    = ["MediaItem"]
hooks     = ["layout.authenticated_sidebar"]
routes    = false
